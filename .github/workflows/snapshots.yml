name: Regenerate Snapshots

on:
  workflow_dispatch: # declenchement manuel uniquement (sans espace apres le #)
  push:
    branches:
      - "snapshots-v*" # auto sur branches snapshot

jobs:
  regen:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          # token avec droit write pour que le bot puisse commiter
          token: ${{ secrets.GITHUB_TOKEN }}
          lfs: true

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.x

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Regenerate PNG snapshots (Linux only - Pitfall 4)
        run: bun run scripts/generate-snapshots.ts

      - name: Commit snapshots
        run: |
          git config user.email "noreply@github.com"
          git config user.name "snapshot-bot"
          git add tests/snapshots/*.png
          git diff --cached --quiet || git commit -m "chore(snapshots): regenerate v11 baselines on ubuntu-latest"
          git push

      - name: Upload snapshot artifacts (inspection)
        uses: actions/upload-artifact@v4
        with:
          name: snapshots-${{ github.sha }}
          path: tests/snapshots/*.png
          retention-days: 14
